# Local dev stack (OSK-52): backend + web + Postgres — the whole system, one command.
#
# Bring it up from a clean clone:
#     ./scripts/dev-setup.sh   # writes a local .env with dev defaults (git-ignored)
#     docker compose up
#
# The app config contract uses bare ${VAR} (NO :-default) so a prod misconfig fails
# loudly (pairs with the fail-loud validator, OSK-25). The local convenience is the
# GENERATED .env — not a weakening of the contract. The stack binds to 127.0.0.1 only.
#
# Authenticated local testing (once Firebase auth lands, OSK-28) additionally needs the
# host ADC mounted — use the overlay:
#     gcloud auth application-default login
#     docker compose -f docker-compose.yml -f docker-compose.auth.yml up
name: openskeleton

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data   # named volume => data survives restarts
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      PORT: "8080"
      # Wired for when the JDBC/Flyway layer lands (OSK-32); the dev profile's
      # datasource is inert until then. Host is the compose service name "postgres".
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:8080:8080"

  web:
    build: ./web
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8081:80"

volumes:
  pgdata:
