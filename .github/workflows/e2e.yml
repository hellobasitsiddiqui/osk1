# e2e.yml — browser end-to-end smoke suite for the OpenSkeleton web pages (OSK-81).
#
# WHAT: runs the Playwright harness under web/e2e/ in headless Chromium against the
#       committed static web/ pages. The harness serves web/ itself (a tiny zero-dep
#       static server that mirrors the Firebase Hosting rewrites — see
#       web/e2e/static-server.mjs) and walks "/", "/status" and "/ops", asserting
#       they render and degrade gracefully when the backend is down.
#
# WHY IT IS NOT ON THE PR GATE: browser e2e is slower and heavier than the backend
#       unit build. Keeping it OFF pull requests (it is deliberately absent from
#       ci.yml) keeps the PR gate fast. It runs post-merge on main — the honest
#       integration signal — and on manual dispatch for ad-hoc runs. If it ever needs
#       to block merges, add `pull_request:` here (never fold it into ci.yml).
#
# SECURITY: every third-party action is pinned to a full commit SHA (never a moving
#           tag), matching the convention in ci.yml. The trailing "# vX.Y.Z" records
#           the human-readable version each SHA corresponds to. The SHAs here are the
#           SAME ones already used elsewhere in this repo:
#             - actions/checkout        -> ci.yml
#             - actions/setup-node      -> hosting-deploy.yml / preview.yml
#             - actions/upload-artifact -> ci.yml

name: E2E

# Post-merge on main + manual dispatch ONLY. NOT on pull_request — the PR gate
# (ci.yml) stays fast; this is the heavier browser signal that runs after merge.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege: this job only reads the repo and uploads an artifact; it needs
# no write scopes on the repo contents.
permissions:
  contents: read

# Supersede an in-progress run for the same ref when a newer commit arrives, so we
# don't burn minutes on stale browser runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright smoke (headless Chromium)
    runs-on: ubuntu-latest
    # All steps run inside the self-contained harness package.
    defaults:
      run:
        working-directory: web/e2e
    steps:
      # Check out the source so we have both the harness (web/e2e) and the static
      # pages it serves (web/).
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Node to install and run Playwright. npm cache is keyed off the harness lock.
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/e2e/package-lock.json

      # Reproducible install from the committed lockfile.
      - name: Install harness dependencies
        run: npm ci

      # Fetch the Chromium browser + its OS-level libraries. --with-deps installs the
      # apt packages Chromium needs on the ubuntu runner; chromium limits it to the
      # one browser this suite uses (no Firefox/WebKit download).
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Run the suite. playwright.config.ts's webServer boots static-server.mjs to
      # serve web/ on a port, waits for it, runs the specs, then tears it down.
      - name: Run Playwright smoke suite
        run: npx playwright test

      # On failure, upload the HTML report + screenshots/video/traces so a red run is
      # debuggable without re-running locally. Skipped on green to save storage.
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.4.3
        with:
          name: playwright-report
          path: |
            web/e2e/playwright-report
            web/e2e/test-results
          if-no-files-found: warn
          retention-days: 7
