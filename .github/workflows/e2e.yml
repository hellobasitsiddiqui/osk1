# e2e.yml — browser end-to-end smoke suite for the OpenSkeleton web pages (OSK-81).
#
# WHAT: runs the Playwright harness under web/e2e/ in headless Chromium against the
#       committed static web/ pages. The harness serves web/ itself (a tiny zero-dep
#       static server that mirrors the Firebase Hosting rewrites — see
#       web/e2e/static-server.mjs) and walks "/", "/status" and "/ops", asserting
#       they render and degrade gracefully when the backend is down.
#
# WHY IT IS PATH-FILTERED ON PRs (OSK-108): browser e2e is slower and heavier than
#       the backend unit build, so we do NOT want it on every PR. It runs post-merge
#       on main (the honest integration signal) and on manual dispatch — AND, as a
#       no-rot guard, on `pull_request` but ONLY when the PR touches `web/**` (the app
#       pages OR this harness — web/e2e/** is nested under web/**). That means a PR
#       that changes the web front-end or the specs re-runs the suite so specs can't
#       rot unseen, while a PR that doesn't touch web/ gets NO e2e run and the PR gate
#       stays fast. It is still deliberately ABSENT from ci.yml — never fold it in
#       there; add web triggers here instead.
#
# TWO JOBS (OSK-109):
#   - `e2e` (fast gate) runs the smoke + theme specs on push/PR/dispatch via
#     `--project=chromium`. It NEVER runs the visual-regression spec.
#   - `visual` (nightly) runs the brittle+slow pixel-snapshot spec via
#     `--project=visual` (with VISUAL=1) and ONLY on the `schedule:` cron below — not on
#     any PR/push — comparing the live pages against the committed baseline PNGs
#     (web/e2e/tests/visual.spec.ts-snapshots/). See web/e2e/README.md.
#
# SECURITY: every third-party action is pinned to a full commit SHA (never a moving
#           tag), matching the convention in ci.yml. The trailing "# vX.Y.Z" records
#           the human-readable version each SHA corresponds to. The SHAs here are the
#           SAME ones already used elsewhere in this repo:
#             - actions/checkout        -> ci.yml
#             - actions/setup-node      -> hosting-deploy.yml / preview.yml
#             - actions/upload-artifact -> ci.yml

name: E2E

# Post-merge on main + manual dispatch, PLUS a path-filtered PR trigger (OSK-108) and a
# nightly schedule (OSK-109). The `pull_request` run fires ONLY for PRs that touch web/**
# — the app pages or this harness (web/e2e/** is nested under web/**) — so the specs
# can't rot unseen, while PRs that don't touch web/ get NO e2e run and the PR gate
# (ci.yml) stays fast. The `schedule:` cron drives the nightly `visual` job below (the
# visual-regression spec runs there and NOWHERE else).
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'web/**'
  workflow_dispatch:
  # Nightly at 03:00 UTC — the ONLY trigger that runs the visual-regression job.
  schedule:
    - cron: '0 3 * * *'

# Least-privilege: this job only reads the repo and uploads an artifact; it needs
# no write scopes on the repo contents.
permissions:
  contents: read

# Supersede an in-progress run for the same ref when a newer commit arrives, so we
# don't burn minutes on stale browser runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate: smoke + theme specs on push/PR/dispatch. Never on the nightly schedule
  # (that is the `visual` job below) and never runs the visual-regression spec — it
  # selects --project=chromium, which playwright.config.ts wires to ignore visual.spec.ts.
  e2e:
    name: Playwright smoke (headless Chromium)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    # All steps run inside the self-contained harness package.
    defaults:
      run:
        working-directory: web/e2e
    steps:
      # Check out the source so we have both the harness (web/e2e) and the static
      # pages it serves (web/).
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Node to install and run Playwright. npm cache is keyed off the harness lock.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/e2e/package-lock.json

      # Reproducible install from the committed lockfile.
      - name: Install harness dependencies
        run: npm ci

      # Fetch the Chromium browser + its OS-level libraries. --with-deps installs the
      # apt packages Chromium needs on the ubuntu runner; chromium limits it to the
      # one browser this suite uses (no Firefox/WebKit download).
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Run the smoke + theme specs only (--project=chromium ignores visual.spec.ts).
      # playwright.config.ts's webServer boots static-server.mjs to serve web/ on a port,
      # waits for it, runs the specs, then tears it down.
      - name: Run Playwright smoke suite
        run: npx playwright test --project=chromium

      # On failure, upload the HTML report + screenshots/video/traces so a red run is
      # debuggable without re-running locally. Skipped on green to save storage.
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.3
        with:
          name: playwright-report
          path: |
            web/e2e/playwright-report
            web/e2e/test-results
          if-no-files-found: warn
          retention-days: 7

  # Nightly visual-regression (OSK-109). Runs ONLY on the schedule: cron above — never on
  # a PR or push — because pixel snapshots are brittle + slow. It compares the live pages
  # (both themes) against the committed baseline PNGs in
  # web/e2e/tests/visual.spec.ts-snapshots/. VISUAL=1 + --project=visual together arm the
  # spec's nightly guard; the baselines were generated on Linux to match this runner.
  visual:
    name: Playwright visual regression (nightly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/e2e
    env:
      # Arms the nightly-only guard in tests/visual.spec.ts (test.skip unless set).
      VISUAL: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/e2e/package-lock.json

      - name: Install harness dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Compare the live pages against the committed baselines. --project=visual runs ONLY
      # visual.spec.ts. Do NOT pass --update-snapshots here: a nightly run must FAIL on a
      # real visual drift, not silently rewrite the baseline. Baselines are updated
      # deliberately, locally, via `--update-snapshots` (see web/e2e/README.md).
      - name: Run Playwright visual-regression suite
        run: npx playwright test --project=visual

      # On failure, upload the HTML report — it embeds the expected/actual/diff images so
      # a visual drift is triaged from the artifact without re-running locally.
      - name: Upload Playwright visual artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.3
        with:
          name: playwright-visual-report
          path: |
            web/e2e/playwright-report
            web/e2e/test-results
          if-no-files-found: warn
          retention-days: 7
