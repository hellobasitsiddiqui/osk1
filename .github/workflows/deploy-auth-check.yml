# Keyless deploy-auth check (OSK-42): proves GitHub Actions can authenticate to GCP
# via Workload Identity Federation (OIDC) with NO service-account key. This is the
# auth backbone every deploy job (OSK-19/47/13) reuses.
name: Deploy auth check (OIDC)

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/deploy-auth-check.yml', 'infra/gcp.env']
  workflow_dispatch:

# id-token: write is what lets the runner mint the OIDC token WIF trusts.
permissions:
  contents: read
  id-token: write

jobs:
  auth-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: openskeleton-one
          workload_identity_provider: projects/476227744481/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: gh-deployer@openskeleton-one.iam.gserviceaccount.com
      # No-op federated call: if this returns the project id, keyless auth works.
      - name: Prove keyless auth
        run: gcloud projects describe openskeleton-one --format="value(projectId)"
