# gitleaks.yml — Secret-scanning backstop for OpenSkeleton (osk1) — OSK-34 (1.3.6),
# promoted to a BLOCKING gate + given an explicit config in OSK-56.
#
# WHAT: On every pull request targeting main, run Gitleaks over the PR to look
#       for hard-coded secrets (tokens, keys, credentials) in the diff/tree.
#
# WHY:  GitHub-native secret scanning + push protection are ALREADY enabled on
#       this public repo and are the primary defence — they block known secret
#       patterns at push time and alert on the default branch. Gitleaks runs
#       here as a *second, independent* pair of eyes inside CI: it uses a
#       different rule set and catches generic/high-entropy patterns that the
#       native provider-token scanner does not. Belt-and-braces, not a
#       replacement.
#
# BLOCKING (OSK-56): this job is now a HARD gate. The scan step no longer uses
#       `continue-on-error`, so a Gitleaks finding FAILS the check and blocks the
#       merge — a NEW leak that slips past push protection (e.g. a generic
#       high-entropy credential the native scanner does not recognise) cannot
#       land on main. The first line of defence is still the OSK-56 LOCAL
#       pre-commit gitleaks hook (.pre-commit-config.yaml), which stops a secret
#       before it ever leaves the machine; this CI run is the backstop for anyone
#       who has not installed the hook. Treat any finding here as a signal to
#       investigate and rotate — see SECURITY.md, "Handling a flagged or leaked
#       secret".
#
# CONFIG: the scan reads the repo-root `.gitleaks.toml` (via GITLEAKS_CONFIG),
#       which extends the default ruleset and adds ONE tightly-scoped allowlist
#       for the known-public Firebase Web client config in web/config.js (a
#       public client identifier, NOT a secret). This is the SAME config the
#       local pre-commit hook uses, so local and CI agree. The allowlist is
#       narrow (path + exact literal) so it cannot mask a real, different secret.
#
# SECURITY: The third-party action is pinned to a full commit SHA (never a
#           moving tag) so a re-pointed/compromised tag cannot inject code into
#           CI. The trailing "# vX.Y.Z" comment records the human-readable
#           version the SHA corresponds to. Note: gitleaks-action is free for
#           public repositories and personal accounts, so no GITLEAKS_LICENSE
#           secret is required here.

name: Gitleaks

# Run on PRs into main only. Push protection already guards the push path and
# native secret scanning watches the default branch, so the PR is the useful
# place for this CI backstop to add coverage.
on:
  pull_request:
    branches: [main]

# Least-privilege: the scan only needs to read the checked-out source.
permissions:
  contents: read

# Cancel a superseded in-progress run for the same PR/branch when a new commit
# arrives, so we don't waste CI minutes re-scanning stale trees.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks secret scan (blocking)
    runs-on: ubuntu-latest
    steps:
      # Full history checkout: fetch-depth 0 lets Gitleaks scan the range of
      # commits introduced by the PR (not just the tip), so a secret added and
      # then "removed" in a later commit of the same PR is still caught.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Run Gitleaks as a BLOCKING gate (OSK-56): no `continue-on-error`, so a
      # finding fails this required check and blocks the merge. GITLEAKS_CONFIG
      # points the scan at the repo-root `.gitleaks.toml` (default ruleset + the
      # tightly-scoped Firebase public-config allowlist) — the SAME config the
      # local pre-commit hook uses, so the already-committed public Firebase key
      # is NOT a finding while a genuine new secret still fails the build.
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
