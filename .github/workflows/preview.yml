# preview.yml — Per-PR preview environments (OSK-30).
#
# WHAT: For every open pull request into `main`, ship an isolated, throwaway
#       preview of BOTH surfaces so a reviewer can click and try the change:
#         * WEB     → a Firebase Hosting PREVIEW CHANNEL (`pr-<N>`), auto-expiring,
#                     served on its own *.web.app URL — never the live channel.
#         * BACKEND → a TAGGED, NO-TRAFFIC Cloud Run revision (`--tag pr-<N>`) on
#                     the SAME `openskeleton-backend` service. It gets its own stable
#                     preview URL (https://pr-<N>---openskeleton-backend-…run.app)
#                     but takes ZERO production traffic (--no-traffic), so it can
#                     never affect live users.
#       Both preview URLs are posted back as a single, marker-updated PR comment
#       (edited in place on each push, not re-spammed). On merge/close the channel
#       and the tagged revision are torn down.
#
# WHY a per-PR image build: image.yml only PUSHES the backend image on `main`, so a
#      PR's code has no image in Artifact Registry yet. This workflow therefore
#      builds the PR HEAD and pushes it under a PR-scoped tag (`pr-<N>-<headSha>`)
#      to the SAME repo, then deploys THAT to the no-traffic tagged revision. The
#      web preview's apiBaseUrl is injected with the backend PREVIEW url (not prod)
#      via the exact node-rewrite seam hosting-deploy.yml uses, so the web preview
#      talks to the matching backend preview.
#
# AUTH: keyless — GitHub federates to GCP via Workload Identity Federation (OIDC,
#       OSK-42); no service-account JSON key and no `firebase login:ci` token. The
#       single auth step both (a) emits a short-lived access_token used to `docker
#       login` to Artifact Registry and (b) writes GOOGLE_APPLICATION_CREDENTIALS
#       that gcloud + firebase-tools pick up as Application Default Credentials.
#       NOTE on forks: a pull_request from a FORK cannot mint an OIDC token that WIF
#       trusts (GitHub gives fork PRs a read-only token and withholds OIDC), so the
#       auth step simply fails and no preview is produced. That is acceptable and
#       intentional — same-repo PRs only, no special-casing beyond GitHub's default.
#
# SECURITY: every third-party action is pinned to a full commit SHA — the exact SHAs
#           already vetted in deploy.yml / hosting-deploy.yml / image.yml; the
#           trailing "# vX.Y.Z" records the human-readable tag. The PR comment uses
#           `gh api` with the built-in GITHUB_TOKEN (no extra action to pin).
#
# DB ISOLATION (OSK-58 root fix — see docs/adr/0006-isolate-pr-preview-database.md,
#   LESSONS L12): the preview backend migrates its OWN database `osk_preview` on the
#   SAME Cloud SQL instance, NEVER the prod `osk` DB/Flyway history. This is the whole
#   reason a preview once stalled prod: it applied its Flyway migrations to prod `osk`
#   out of merge order, gapping the history so Flyway `validate` failed at boot and the
#   startup probe (and prod deploy) failed (TM-65). `PREVIEW_DB_NAME` below is the single
#   isolation value; an idempotent "ensure preview database" step creates `osk_preview`
#   if missing; a hard guard fails the job if the preview DB name is ever empty or `osk`.
#
# STATUS: this workflow is currently DISABLED (`gh workflow disable "PR preview
#   environments"`) — it was turned off to stop the prod pollution and is NOT re-enabled
#   by this change. The prod-safety fix is baked into the file (so even an accidental
#   re-enable is prod-safe), but restoring the feature needs one IAM grant + a first live
#   green run. The exact, ordered re-enable steps live in ADR-0006 ("Re-enable runbook").

name: PR preview environments

# Fire on PR lifecycle events. opened/synchronize/reopened (build/refresh the
# preview); closed (tear it down). The per-job `if` on github.event.action routes
# each event to the right job.
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# Least privilege:
#   - contents: read       → checkout the PR source.
#   - id-token: write      → mint the OIDC token WIF trusts (keyless GCP auth).
#   - pull-requests: write → post/update the preview-URL comment on the PR.
permissions:
  contents: read
  id-token: write
  pull-requests: write

# One preview per PR at a time. A newer push (synchronize) supersedes an in-flight
# preview build for the same PR, and a close supersedes a running build before it
# cleans up — so cancel-in-progress is correct here (unlike the live-deploy jobs,
# nothing half-applied to production can result from cancelling a preview).
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Shared, non-secret targets — the SAME values deploy.yml / image.yml use, so a
# preview is a faithful mirror of prod (same project, region, image repo, Cloud SQL,
# runtime SA, service). Kept here once so both jobs read one source of truth.
env:
  PROJECT_ID: openskeleton-one
  REGION: europe-west2
  SERVICE: openskeleton-backend
  IMAGE_REPO: europe-west2-docker.pkg.dev/openskeleton-one/osk-backend/backend
  INSTANCE_CONNECTION_NAME: openskeleton-one:europe-west2:osk-pg
  RUNTIME_SA: 476227744481-compute@developer.gserviceaccount.com
  # OSK-58 ROOT FIX — the ONE value that isolates previews from prod. Preview backends
  # migrate this DEDICATED database on the same osk-pg instance, so a preview's Flyway
  # can never touch the prod `osk` schema/history again (the DB_NAME below is the only
  # runtime-env difference from deploy.yml). This must NEVER be `osk`; the ensure-DB step
  # guards it. Deliberately its OWN database, not the prod one — see ADR-0006 / LESSONS L12.
  PREVIEW_DB_NAME: osk_preview
  # The service's stable (untagged) Cloud Run URL — used only to DERIVE the tagged
  # preview URL (https://pr-<N>---<same host>) without duplicating the project
  # number/region. Matches deploy.yml's SERVICE_URL.
  SERVICE_URL: https://openskeleton-backend-476227744481.europe-west2.run.app

jobs:
  # ---------------------------------------------------------------------------
  # PREVIEW — build + deploy both surfaces, then comment the URLs.
  # Runs on open/synchronize/reopen only (NOT on close).
  # ---------------------------------------------------------------------------
  preview:
    name: Deploy PR preview (web channel + no-traffic backend revision)
    if: ${{ github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    steps:
      # Check out the PR HEAD (not the default merge ref) so the image we build and
      # the buildSha we stamp match the exact commit the reviewer sees.
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # Node is needed for the Firebase CLI and the config.js injection seam.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      # Keyless auth to GCP (OIDC/WIF). token_format: access_token gives us the
      # short-lived token for `docker login`; the same step also writes
      # GOOGLE_APPLICATION_CREDENTIALS for gcloud + firebase-tools.
      - name: Authenticate to Google Cloud (keyless OIDC / WIF)
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: openskeleton-one
          workload_identity_provider: projects/476227744481/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: gh-deployer@openskeleton-one.iam.gserviceaccount.com
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      # OSK-58 ROOT FIX — ensure the ISOLATED preview database exists BEFORE we build
      # or deploy anything, and fail fast (before the costly image build) if it can't
      # be guaranteed. Two guarantees:
      #   1. HARD GUARD — refuse to run if PREVIEW_DB_NAME is empty or `osk`. A preview
      #      must migrate its own DB, never prod; this makes a mis-edit a red build, not
      #      a silent prod-pollution.
      #   2. IDEMPOTENT CREATE-IF-MISSING — `describe` (read-only) then `create` ONLY when
      #      absent (the CREATE DATABASE IF NOT EXISTS equivalent). This touches ONLY the
      #      `osk_preview` database on the shared instance; it never reads, writes, or
      #      alters the prod `osk` database or its data, and creating a database only ever
      #      makes a new EMPTY one. The instance id is derived from INSTANCE_CONNECTION_NAME
      #      (project:region:instance) so there is one source of truth.
      # NOTE: needs the deploy SA to hold cloudsql.databases.create/get (a one-time IAM
      #       grant — see ADR-0006 re-enable runbook); today it has only cloudsql.client.
      - name: Ensure isolated preview database exists (never prod osk)
        run: |
          set -euo pipefail
          INSTANCE_NAME="${INSTANCE_CONNECTION_NAME##*:}"
          if [ -z "${PREVIEW_DB_NAME}" ] || [ "${PREVIEW_DB_NAME}" = "osk" ]; then
            echo "::error::PREVIEW_DB_NAME must be a dedicated preview database, never the prod 'osk' DB (got '${PREVIEW_DB_NAME}'). Refusing to build or deploy a preview."
            exit 1
          fi
          echo "Ensuring preview database '${PREVIEW_DB_NAME}' on instance '${INSTANCE_NAME}' (prod 'osk' is never touched)."
          if gcloud sql databases describe "${PREVIEW_DB_NAME}" \
               --instance="${INSTANCE_NAME}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
            echo "Preview database '${PREVIEW_DB_NAME}' already exists — nothing to create."
          else
            echo "Preview database '${PREVIEW_DB_NAME}' not found — creating it (one-time, idempotent)."
            gcloud sql databases create "${PREVIEW_DB_NAME}" \
              --instance="${INSTANCE_NAME}" --project="${PROJECT_ID}" --quiet
          fi

      # BuildKit for the PR image build/push (same as image.yml).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Log Docker into Artifact Registry with the federated access token (fixed
      # username "oauth2accesstoken" for GCP), so the build-push step can push.
      - name: Log in to Artifact Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: europe-west2-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # Compute all PR-scoped identifiers once so build/deploy/comment stay in sync:
      #   tag         → the Cloud Run traffic tag + Firebase channel id (pr-<N>).
      #   image       → the unique PR image ref (pr-<N>-<full head sha>).
      #   short_sha   → stamped into config.js buildSha (footer).
      #   preview_url → the DETERMINISTIC tagged Cloud Run URL. Known before deploy,
      #                 so it can be passed as the backend's own APP_PUBLIC_BASE_URL
      #                 (which is @NotBlank in the prod profile). Derived from
      #                 SERVICE_URL by prefixing "pr-<N>---" to the host.
      - name: Compute preview identifiers
        id: meta
        run: |
          set -euo pipefail
          PR='${{ github.event.pull_request.number }}'
          HEAD_SHA='${{ github.event.pull_request.head.sha }}'
          TAG="pr-${PR}"
          HOST="${SERVICE_URL#https://}"
          {
            echo "pr=${PR}"
            echo "tag=${TAG}"
            echo "short_sha=${HEAD_SHA:0:7}"
            echo "image=${IMAGE_REPO}:${TAG}-${HEAD_SHA}"
            echo "preview_url=https://${TAG}---${HOST}"
          } >> "${GITHUB_OUTPUT}"

      # Build the PR HEAD and push it under the PR-scoped tag. This is the preview
      # equivalent of image.yml, except it ALWAYS pushes (to a pr-* tag, never
      # `latest`). provenance: false keeps a single plain manifest for Cloud Run.
      - name: Build and push PR backend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.event.pull_request.head.sha }}
          tags: |
            ${{ steps.meta.outputs.image }}
          provenance: false

      # Deploy the PR image as a NO-TRAFFIC, TAGGED revision of the live service.
      # Reuses deploy.yml's runtime SA, Cloud SQL instance, secret, probes and
      # resource flags verbatim — the ONLY differences are:
      #   * DB_NAME is the ISOLATED preview DB (${PREVIEW_DB_NAME}), NOT prod `osk`
      #     (OSK-58 root fix) — so this revision's Flyway migrates only osk_preview and
      #     can never gap the prod schema/history again (the whole cause of TM-65).
      #   * APP_PUBLIC_BASE_URL is the preview URL (this revision's own tagged URL),
      #   * --no-traffic --tag=pr-<N> REPLACES --to-latest, so 0% of production
      #     traffic ever reaches it while it still gets a stable preview URL.
      # After deploy, resolve the tagged URL authoritatively from the service's
      # traffic targets; fall back to the deterministic constructed URL.
      - name: Deploy backend preview revision (no-traffic, tagged)
        id: deploy
        run: |
          set -euo pipefail
          TAG='${{ steps.meta.outputs.tag }}'
          PREVIEW_URL='${{ steps.meta.outputs.preview_url }}'
          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --image='${{ steps.meta.outputs.image }}' \
            --service-account="${RUNTIME_SA}" \
            --add-cloudsql-instances="${INSTANCE_CONNECTION_NAME}" \
            --set-secrets="DB_PASSWORD=osk-db-app-password:latest" \
            --set-env-vars="^@^SPRING_PROFILES_ACTIVE=prod@INSTANCE_CONNECTION_NAME=${INSTANCE_CONNECTION_NAME}@DB_NAME=${PREVIEW_DB_NAME}@DB_USERNAME=app@APP_ENVIRONMENT_NAME=prod@GOOGLE_CLOUD_PROJECT=${PROJECT_ID}@APP_PUBLIC_BASE_URL=${PREVIEW_URL}" \
            --min-instances=0 --max-instances=2 \
            --cpu=1 --memory=1Gi --cpu-boost \
            --port=8080 --timeout=300 \
            --startup-probe="httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=10,periodSeconds=5,failureThreshold=12,timeoutSeconds=3" \
            --liveness-probe="httpGet.path=/health,httpGet.port=8080,periodSeconds=30,failureThreshold=3,timeoutSeconds=3" \
            --no-allow-unauthenticated \
            --no-traffic \
            --tag="${TAG}" \
            --quiet
          BACKEND_URL="$(gcloud run services describe "${SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" --format='json' \
            | jq -r --arg t "${TAG}" '.status.traffic[] | select(.tag==$t) | .url' | head -n1)"
          if [ -z "${BACKEND_URL}" ] || [ "${BACKEND_URL}" = "null" ]; then
            echo "::notice::Tagged URL not yet in traffic targets; using deterministic constructed URL."
            BACKEND_URL="${PREVIEW_URL}"
          fi
          echo "Backend preview URL: ${BACKEND_URL}"
          echo "backend_url=${BACKEND_URL}" >> "${GITHUB_OUTPUT}"

      # Point the web preview at the BACKEND PREVIEW (not prod) and stamp buildSha —
      # using the EXACT node-rewrite seam from hosting-deploy.yml (env-var in, no sed
      # escaping; fails loudly if a key is missing so a config refactor can't silently
      # skip injection). apiBaseUrl := the tagged backend preview URL.
      - name: Inject backend preview URL + buildSha into web config
        env:
          NEW_URL: ${{ steps.deploy.outputs.backend_url }}
          BUILD_SHA: ${{ steps.meta.outputs.short_sha }}
        run: |
          set -euo pipefail
          CONFIG=web/config.js
          CONFIG="${CONFIG}" NEW_URL="${NEW_URL}" node -e '
            const fs = require("fs");
            const p = process.env.CONFIG;
            const url = process.env.NEW_URL || "";
            const re = /(apiBaseUrl:\s*")[^"]*(")/;
            let s = fs.readFileSync(p, "utf8");
            if (!re.test(s)) { console.error("::error::apiBaseUrl not found in " + p); process.exit(1); }
            s = s.replace(re, "$1" + url + "$2");
            fs.writeFileSync(p, s);
            console.log("Wrote apiBaseUrl=" + JSON.stringify(url) + " to " + p);
          '
          CONFIG="${CONFIG}" BUILD_SHA="${BUILD_SHA}" node -e '
            const fs = require("fs");
            const p = process.env.CONFIG;
            const sha = process.env.BUILD_SHA || "unknown";
            const re = /(buildSha:\s*")[^"]*(")/;
            let s = fs.readFileSync(p, "utf8");
            if (!re.test(s)) { console.error("::error::buildSha not found in " + p); process.exit(1); }
            s = s.replace(re, "$1" + sha + "$2");
            fs.writeFileSync(p, s);
            console.log("Wrote buildSha=" + JSON.stringify(sha) + " to " + p);
          '
          grep -n 'apiBaseUrl\|buildSha' "${CONFIG}"

      # Fail-closed: the whole point of injecting the preview URL is that the web
      # preview must never fall back to the committed loopback dev default (dead
      # /api + PNA prompts). Inspect the apiBaseUrl VALUE only (comments legitimately
      # mention localhost) and block the channel deploy if it is a loopback host.
      - name: Guard — no loopback apiBaseUrl may ship to the preview channel
        run: |
          set -euo pipefail
          node -e '
            const fs = require("fs");
            const p = "web/config.js";
            const m = fs.readFileSync(p, "utf8").match(/apiBaseUrl:\s*"([^"]*)"/);
            if (!m) { console.error("::error::apiBaseUrl not found in " + p); process.exit(1); }
            const v = m[1];
            console.log("Preview apiBaseUrl value: " + JSON.stringify(v));
            if (/127\.0\.0\.1|localhost|::1|0\.0\.0\.0/i.test(v)) {
              console.error("::error::Refusing to deploy preview — apiBaseUrl is a loopback/dev value (" + v + "). Backend-URL injection did not apply.");
              process.exit(1);
            }
            console.log("Guard passed: apiBaseUrl points at the backend preview.");
          '

      # Pin the Firebase CLI to the same version hosting-deploy.yml uses.
      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.22.4

      # Deploy the web to a PREVIEW CHANNEL (NOT the live channel). The channel is
      # named pr-<N> and auto-expires after 7 days (a safety net on top of the
      # explicit teardown on close). --json gives machine-readable output we parse
      # for the channel URL.
      - name: Deploy web to Firebase preview channel
        id: channel
        run: |
          set -euo pipefail
          TAG='${{ steps.meta.outputs.tag }}'
          firebase hosting:channel:deploy "${TAG}" \
            --project openskeleton-one \
            --expires 7d \
            --json > channel.json
          WEB_URL="$(jq -r '.result[].url // empty' channel.json | head -n1)"
          if [ -z "${WEB_URL}" ]; then
            echo "::error::Could not resolve preview channel URL from firebase output."
            cat channel.json || true
            exit 1
          fi
          echo "Web preview URL: ${WEB_URL}"
          echo "web_url=${WEB_URL}" >> "${GITHUB_OUTPUT}"

      # AC-2: post ONE comment with both preview URLs, edited in place on each push
      # (found by a hidden marker) rather than spamming a new comment per push. Uses
      # `gh api` with the built-in GITHUB_TOKEN — no extra action to SHA-pin.
      - name: Comment preview URLs on the PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          WEB_URL: ${{ steps.channel.outputs.web_url }}
          BACKEND_URL: ${{ steps.deploy.outputs.backend_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          MARKER='<!-- osk-30-preview -->'
          {
            echo "${MARKER}"
            echo "### PR preview environments"
            echo ""
            echo "| Surface | Preview URL |"
            echo "| --- | --- |"
            echo "| Web (Firebase preview channel \`${PR:+pr-$PR}\`) | ${WEB_URL} |"
            echo "| Backend (Cloud Run no-traffic revision) | ${BACKEND_URL} |"
            echo ""
            echo "- Built from commit \`${HEAD_SHA}\`."
            echo "- The backend preview is a \`--no-traffic\` tagged revision — it takes **zero** production traffic."
            echo "- The web channel auto-expires in 7 days; both previews are torn down when this PR is merged or closed."
          } > comment.md

          EXISTING="$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq "map(select(.body | contains(\"${MARKER}\"))) | .[0].id // empty")"
          if [ -n "${EXISTING}" ]; then
            echo "Updating existing preview comment ${EXISTING}"
            gh api -X PATCH "repos/${REPO}/issues/comments/${EXISTING}" -F body=@comment.md >/dev/null
          else
            echo "Creating preview comment"
            gh api -X POST "repos/${REPO}/issues/${PR}/comments" -F body=@comment.md >/dev/null
          fi

  # ---------------------------------------------------------------------------
  # CLEANUP — tear down the preview on merge/close.
  # Runs ONLY on the close event. Every teardown command is best-effort (|| true)
  # so a missing/already-gone resource never fails the job (AC-3).
  # ---------------------------------------------------------------------------
  cleanup:
    name: Tear down PR preview
    if: ${{ github.event.action == 'closed' }}
    runs-on: ubuntu-latest
    steps:
      # Checkout gives firebase-tools the firebase.json / .firebaserc project config.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud (keyless OIDC / WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: openskeleton-one
          workload_identity_provider: projects/476227744481/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: gh-deployer@openskeleton-one.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.22.4

      # Delete the Firebase preview channel (idempotent; --force skips the prompt).
      - name: Delete Firebase preview channel
        run: |
          set -euo pipefail
          TAG="pr-${{ github.event.pull_request.number }}"
          firebase hosting:channel:delete "${TAG}" \
            --project openskeleton-one \
            --force || true

      # Remove the Cloud Run tag (frees the preview URL) and delete the now-untagged,
      # no-traffic preview revision. Tag removal MUST precede revision delete (a
      # tagged revision cannot be deleted). Both best-effort.
      - name: Delete tagged Cloud Run preview revision
        run: |
          set -euo pipefail
          TAG="pr-${{ github.event.pull_request.number }}"
          REV="$(gcloud run services describe "${SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" --format='json' 2>/dev/null \
            | jq -r --arg t "${TAG}" '.status.traffic[] | select(.tag==$t) | .revisionName' | head -n1 || true)"
          echo "Tagged revision behind ${TAG}: ${REV:-<none>}"
          gcloud run services update-traffic "${SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --remove-tags="${TAG}" --quiet || true
          if [ -n "${REV}" ] && [ "${REV}" != "null" ]; then
            gcloud run revisions delete "${REV}" \
              --project="${PROJECT_ID}" --region="${REGION}" --quiet || true
          fi

      # Best-effort: update the marker comment to record that the previews are gone.
      - name: Note teardown on the PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          MARKER='<!-- osk-30-preview -->'
          {
            echo "${MARKER}"
            echo "### PR preview environments"
            echo ""
            echo "Preview environments for this PR have been torn down (channel deleted, tagged Cloud Run revision removed)."
          } > comment.md
          EXISTING="$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq "map(select(.body | contains(\"${MARKER}\"))) | .[0].id // empty" || true)"
          if [ -n "${EXISTING}" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${EXISTING}" -F body=@comment.md >/dev/null || true
          fi
