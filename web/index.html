<!DOCTYPE html>
<!--
  index.html — OpenSkeleton web front-end, minimal branded one-pager.

  Why this exists: it is the single static entry point for the SPA. Even though
  there is no client-side router yet, the nginx config falls back to this file
  for any unknown path (SPA-style routing), so this document must be able to
  render on its own for both "/" and deep routes like "/some/deep/route".

  Design choices:
  - Everything is inlined (CSS + markup) so the page is fully self-contained and
    has zero external requests — no fonts, no CDN, no analytics, no secrets.
  - Kept intentionally small; real app bundles land in a later ticket. The
    "build step" for now is a no-op copy (see web/README.md), so what you see
    here is exactly what ships.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenSkeleton</title>
    <!--
      Runtime API config. Loaded as a plain (non-module, non-hashed) script so
      that CD can inject the real backend URL at DEPLOY time without rebuilding
      the page — the Firebase Hosting deploy rewrites config.js's apiBaseUrl.
      See web/config.js and .github/workflows/hosting-deploy.yml.
    -->
    <script src="/config.js"></script>
    <!--
      OSK-127: apply the persisted theme BEFORE first paint to avoid a flash of
      the wrong theme. Only "sketch" is a non-default; anything else (including a
      blocked/absent localStorage) falls through to the default dark theme.
    -->
    <script>
      (function () {
        try {
          if (localStorage.getItem("osk-theme") === "sketch") {
            document.documentElement.setAttribute("data-theme", "sketch");
          }
        } catch (e) {
          /* localStorage unavailable — keep the default theme */
        }
      })();
    </script>
    <style>
      /* Simple dark, centered brand card. No external assets by design. */
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --accent: #4c8bf5;
        --muted: #8b949e;
        /* OSK-127: named so the shared theme-toggle rule can read it (matches the
           #30363d already used for .tag's border below). No visual change. */
        --border: #30363d;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 30%, #161b22 0%, var(--bg) 70%);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        text-align: center;
        padding: 1.5rem;
      }
      .card { max-width: 32rem; }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 1.25rem;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--accent), #7c3aed);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
      }
      h1 { font-size: 1.9rem; margin: 0 0 0.5rem; letter-spacing: -0.02em; }
      p { color: var(--muted); line-height: 1.5; margin: 0.25rem 0; }
      .tag {
        display: inline-block;
        margin-top: 1.25rem;
        padding: 0.35rem 0.8rem;
        border: 1px solid #30363d;
        border-radius: 999px;
        font-size: 0.8rem;
        color: var(--muted);
      }
      /* OSK-100: unobtrusive build/version footer. Small, muted, monospaced so the
         SHAs read as metadata, not headline content. */
      .build {
        margin-top: 1.5rem;
        font-size: 0.72rem;
        line-height: 1.6;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
          monospace;
      }
      .build .label { opacity: 0.7; }
      /* OSK-96: discreet link to the public status page, styled as quiet metadata
         so it sits with the build stamp rather than competing with the headline. */
      .status-link { margin-top: 0.9rem; font-size: 0.78rem; }
      .status-link a { color: var(--muted); text-decoration: none; }
      .status-link a:hover { color: var(--accent); text-decoration: underline; }

      /* OSK-117: mobile-web polish. Phones in portrait (~360–430px wide) only —
         everything above is untouched, so the desktop card is preserved. */
      @media (max-width: 640px) {
        /* Trim the outer padding a touch so the card gets the full narrow width. */
        body { padding: 1.25rem 1rem; }
        h1 { font-size: 1.6rem; }
        /* Long deploy SHAs / build ids must wrap, never force a sideways scroll. */
        .build { overflow-wrap: anywhere; }
        /* Roomier, easier-to-tap footer links (status / ops) on touch screens. */
        .status-link { font-size: 0.85rem; }
        .status-link a { display: inline-block; padding: 0.35rem 0.15rem; }
      }

      /* ================================================================== *
       * OSK-127 — selectable "sketch / blueprint" theme + its toggle.
       * Everything theme-specific is scoped under [data-theme="sketch"], so
       * the default dark theme above is left exactly as it was. The toggle
       * button style is theme-agnostic (reads the shared palette vars). This
       * whole block is identical across index.html, status.html and ops.html.
       * ================================================================== */

      /* Toggle control: quiet, metadata-sized pill that works in both themes.
         It reads the shared vars, so it re-skins automatically. margin-left:
         auto right-aligns it inside the flex footers and is a no-op elsewhere. */
      .theme-switch { margin-top: 1rem; }
      .theme-toggle {
        font: inherit;
        font-size: 0.78rem;
        line-height: 1.2;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.3rem 0.75rem;
        margin-left: auto;
        cursor: pointer;
        -webkit-appearance: none;
        appearance: none;
      }
      .theme-toggle:hover { color: var(--fg); border-color: var(--muted); }
      .theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

      /* --- Sketch palette. Same specificity as :root (both target the root
         element) but declared later, so these win when data-theme="sketch".
         The existing rules already read these vars, so most of the page
         re-colours for free. --- */
      [data-theme="sketch"] {
        --bg: #eef1e6;                      /* pale graph paper */
        --fg: #16283b;                      /* dark ink */
        --muted: #5b6b78;                   /* faded pencil */
        --accent: #1f5aa8;                  /* blueprint blue */
        --border: #34465a;                  /* ink border */
        --panel: rgba(255, 255, 255, 0.55); /* translucent paper — grid shows through */
        --ok: #2f8f3e;                      /* darker status hues for light-paper contrast */
        --warn: #b3781a;
        --down: #cf3b32;
      }

      /* Graph paper: a fine minor grid (24px) plus heavier lines every 5th cell
         (120px), layered via repeating-linear-gradients. background-color +
         background-image (not the shorthand) cleanly overrides the default
         page's radial-gradient. Monospace body = technical-drawing feel; system
         fonts only, so the page still makes zero external requests. */
      [data-theme="sketch"] body {
        background-color: var(--bg);
        background-image:
          repeating-linear-gradient(0deg,  rgba(47, 74, 110, 0.07) 0 1px, transparent 1px 24px),
          repeating-linear-gradient(90deg, rgba(47, 74, 110, 0.07) 0 1px, transparent 1px 24px),
          repeating-linear-gradient(0deg,  rgba(47, 74, 110, 0.16) 0 1px, transparent 1px 120px),
          repeating-linear-gradient(90deg, rgba(47, 74, 110, 0.16) 0 1px, transparent 1px 120px);
        background-attachment: fixed;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      }
      /* Monospace looks cramped with the default negative tracking. */
      [data-theme="sketch"] h1,
      [data-theme="sketch"] h2,
      [data-theme="sketch"] h3 { letter-spacing: 0; }

      /* Hand-drawn surfaces: the irregular border-radius trick gives a wobbly,
         sketched outline; the hard offset shadow reads like a second marker
         pass; the translucent paper fill lets the grid ghost through. */
      [data-theme="sketch"] .card,
      [data-theme="sketch"] .panel {
        background: var(--panel);
        border: 1.5px solid var(--border);
        border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
        box-shadow: 2px 3px 0 rgba(22, 40, 59, 0.13);
      }
      /* index's brand card has no padding by default — give the paper card room. */
      [data-theme="sketch"] .card { padding: 1.75rem 1.5rem; }
      /* Alternate the wobble so repeated panels don't look stamped. */
      [data-theme="sketch"] .panel:nth-of-type(even) {
        border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
      }
      /* Banner / health strip: keep their coloured left accent (it re-skins via
         the vars) and just add the paper fill, wobble + shadow. No border-color
         is set here, so the state classes' left accent is preserved. */
      [data-theme="sketch"] .banner,
      [data-theme="sketch"] .health {
        background: var(--panel);
        border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
        box-shadow: 2px 3px 0 rgba(22, 40, 59, 0.13);
      }
      /* status.html chart shells: solid inked wobble + light paper fill so they
         read on paper instead of the dark default. */
      [data-theme="sketch"] .chart {
        background: var(--panel);
        border-style: solid;
        border-radius: 15px 225px 15px 255px / 225px 15px 255px 15px;
        box-shadow: 2px 3px 0 rgba(22, 40, 59, 0.13);
      }
      [data-theme="sketch"] .chart__placeholder {
        background:
          repeating-linear-gradient(90deg, transparent 0 22px, rgba(47, 74, 110, 0.10) 22px 23px);
      }
      /* index brand chip → blueprint outline box (was a solid gradient). */
      [data-theme="sketch"] .logo {
        background: rgba(31, 90, 168, 0.10);
        color: var(--accent);
        border: 1.5px solid var(--accent);
        border-radius: 14px 225px 18px 255px / 255px 16px 225px 15px;
        box-shadow: 2px 3px 0 rgba(22, 40, 59, 0.13);
      }
      /* index pill tag → inked outline in the sketch palette. */
      [data-theme="sketch"] .tag { border-color: var(--border); color: var(--muted); }
      /* The toggle itself, sketchified: wobbly ink outline. */
      [data-theme="sketch"] .theme-toggle {
        border-radius: 14px 225px 14px 225px / 225px 14px 225px 14px;
        box-shadow: 1px 2px 0 rgba(22, 40, 59, 0.13);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo" aria-hidden="true">OS</div>
      <h1>OpenSkeleton</h1>
      <p>The web front-end is up and serving from nginx.</p>
      <p>Static build placeholder — the full single-page app lands soon.</p>
      <span class="tag">web &middot; nginx &middot; container</span>

      <!--
        OSK-100 build/version stamp. Two lines: the web build id (injected into
        config.js's buildSha at deploy time) and the backend build id (fetched live
        from the backend's public /version endpoint). Both resolve at build/deploy
        time — nothing here is hardcoded. Kept intentionally small + muted so it
        reads as metadata, not content.
      -->
      <footer class="build">
        <div>
          <span class="label">web</span> <span id="web-build">dev</span>
        </div>
        <div>
          <span class="label">backend</span> <span id="backend-build">…</span>
        </div>
      </footer>

      <!-- OSK-96: link to the public /status page (live health + outage banner).
           OSK-90: and, next to it, a discreet link to the ops panel (operator
           jump-off page). Both are quiet metadata, styled the same. -->
      <p class="status-link">
        <a href="/status">Service status &rarr;</a>
        &nbsp;&middot;&nbsp;
        <a href="/ops">Ops panel &rarr;</a>
      </p>

      <!-- OSK-127: theme toggle. Small, quiet control; switches Default (dark)
           <-> Sketch (graph-paper) and persists the choice in localStorage. -->
      <p class="theme-switch">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">Theme: Default</button>
      </p>
    </main>

    <script>
      // Render the web build id from the deploy-injected config, then fetch the
      // backend's /version and show both together (AC3). All failures degrade
      // gracefully — a missing/unreachable backend must not break the page.
      (function () {
        var cfg = window.__APP_CONFIG__ || {};

        // 1) Web build id — straight from config.js's buildSha (deploy-injected).
        var webEl = document.getElementById("web-build");
        if (webEl) {
          webEl.textContent = cfg.buildSha || "unknown";
        }

        // 2) Backend build id — fetch the public /version endpoint. apiBaseUrl is
        //    the deploy-resolved backend URL, or "" (same-origin) until the backend
        //    is live. Trim any trailing slash so we never build a "//version" URL.
        var backendEl = document.getElementById("backend-build");
        if (!backendEl) {
          return;
        }
        var base = (cfg.apiBaseUrl || "").replace(/\/+$/, "");
        fetch(base + "/version", { headers: { Accept: "application/json" } })
          .then(function (r) {
            if (!r.ok) {
              throw new Error("HTTP " + r.status);
            }
            return r.json();
          })
          .then(function (v) {
            var sha = v && v.sha ? v.sha : "unknown";
            // Show the Cloud Run revision alongside the SHA when present.
            backendEl.textContent = v && v.revision ? sha + " · " + v.revision : sha;
          })
          .catch(function () {
            // Backend not deployed yet / unreachable — say so quietly, don't error.
            backendEl.textContent = "unavailable";
          });
      })();
    </script>

    <script>
      // OSK-127: theme toggle + persistence. Vanilla, dependency-free, and kept
      // fully separate from the page's existing logic (build stamp above is
      // untouched). The persisted theme is already applied pre-paint by the
      // <head> script; here we wire the button and keep localStorage in sync.
      // XSS-safe: only textContent + a fixed attribute value are ever written —
      // no innerHTML, no untrusted data.
      (function () {
        "use strict";
        var KEY = "osk-theme";
        var root = document.documentElement;
        var btn = document.getElementById("theme-toggle");
        if (!btn) { return; }

        function isSketch() { return root.getAttribute("data-theme") === "sketch"; }

        // Reflect the active theme in the button label + pressed state.
        function sync() {
          btn.textContent = isSketch() ? "Theme: Sketch" : "Theme: Default";
          btn.setAttribute("aria-pressed", isSketch() ? "true" : "false");
        }

        // Apply a theme, persist it, and refresh the button.
        function apply(theme) {
          if (theme === "sketch") {
            root.setAttribute("data-theme", "sketch");
          } else {
            root.removeAttribute("data-theme");
          }
          try {
            localStorage.setItem(KEY, theme);
          } catch (e) {
            /* persistence unavailable — theme still applies for this session */
          }
          sync();
        }

        btn.addEventListener("click", function () {
          apply(isSketch() ? "default" : "sketch");
        });

        sync(); // correct the label for whatever the pre-paint script decided
      })();
    </script>
  </body>
</html>
