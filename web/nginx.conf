# nginx.conf — server config for the OpenSkeleton web container.
#
# Why this exists: nginx:alpine ships a default server block that does plain
# static file serving with no SPA fallback and no tuned caching. This file
# replaces that default (copied over /etc/nginx/conf.d/default.conf in the
# Dockerfile) to give us two things a single-page app needs:
#   1. SPA-style routing: any unknown path falls back to index.html so the
#      client-side router (added later) can handle deep links / refreshes,
#      instead of nginx returning its own 404.
#   2. Sane caching: fingerprinted/hashed assets are immutable and cached for a
#      year, while index.html is never cached so new deploys are picked up
#      immediately (otherwise users get a stale shell pointing at old bundles).

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip keeps the text payloads small; cheap win for HTML/CSS/JS/JSON.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # --- SPA routing -------------------------------------------------------
    # Try the literal file, then a directory, then fall back to index.html.
    # This is what makes /some/deep/route return 200 (the app shell) rather
    # than a 404 — the browser-side router takes it from there.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Caching: hashed static assets -------------------------------------
    # Build tools emit filenames with a content hash (e.g. app.9f2a1c.js).
    # Because the hash changes whenever the content changes, these files are
    # safe to cache forever ("immutable"). Matches common static extensions.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|svg|webp|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- Caching: the HTML shell -------------------------------------------
    # index.html must never be cached: it is the pointer to the current asset
    # bundle, so a stale copy would keep users on an old build.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # Lightweight liveness endpoint for container/orchestrator health checks.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
