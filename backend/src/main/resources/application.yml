# Base application config shared by every profile. Only safe, non-secret defaults
# live here; each profile YAML (application-{dev,test,prod}.yml) overrides what it
# needs. 12-factor: values are env-overridable and the active profile is chosen
# with SPRING_PROFILES_ACTIVE (no profile => these base defaults, good for a
# zero-setup local run and for tests).
spring:
  application:
    name: backend
  # --- Security auto-configuration: method security only, no web chain (OSK-71) --
  # OSK-71 adds spring-security-config for @EnableMethodSecurity/@PreAuthorize but
  # deliberately keeps NO spring-security-web (see pom.xml). Having -config on the
  # classpath makes Boot's SecurityAutoConfiguration try to enable a web security
  # filter chain (@EnableWebSecurity), which needs -web and would otherwise fail /
  # change request handling. Exclude the servlet security auto-configs so only the
  # method-level authorization we opt into via @EnableMethodSecurity is active; the
  # hand-rolled FirebaseAuthenticationFilter remains the sole request-path auth gate.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  # --- Persistence / JPA (OSK-32) ----------------------------------------------
  # Flyway owns the schema (it is auto-enabled by Boot and runs its db/migration
  # scripts on startup). Hibernate is therefore locked to `validate`: it never
  # creates or alters tables, it only asserts the entity mappings match the
  # Flyway-built schema and fails fast on drift. With no entities yet this check
  # passes trivially, but it is on from day one so the guard is never retrofitted.
  jpa:
    hibernate:
      ddl-auto: validate
    # Close the persistence context at the end of the service call, not the view
    # render. open-in-view is an anti-pattern (hidden lazy-loading queries during
    # serialization); disable it explicitly rather than rely on the noisy default.
    open-in-view: false
server:
  # Honour the platform-provided port (Cloud Run sets $PORT); 8080 locally.
  port: ${PORT:8080}

# Strongly-typed app settings, bound + validated via AppProperties (app.*).
# Base supplies local-safe defaults so the app boots with zero config; the prod
# profile deliberately drops the defaults to force explicit, env-supplied values.
app:
  environment-name: local
  public-base-url: http://localhost:8080
  # --- API rate limiting (OSK-63) ----------------------------------------------
  # Per-client token bucket on /api/** for abuse/DoS protection, bound + validated
  # via RateLimitProperties (app.rate-limit.*). Defaults below = 100 requests/minute
  # per client with a burst of 100; each value is env-overridable so operators can
  # tune limits without a rebuild. /health, /actuator/** and readiness are exempt.
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    capacity: ${APP_RATE_LIMIT_CAPACITY:100}
    refill-tokens: ${APP_RATE_LIMIT_REFILL_TOKENS:100}
    refill-period: ${APP_RATE_LIMIT_REFILL_PERIOD:1m}
  # --- List pagination / sorting (OSK-87) --------------------------------------
  # Shared convention for list endpoints, bound via PaginationProperties
  # (app.pagination.*). `size` is hard-capped at max-page-size so no request can pull
  # an unbounded result set; a param-less request gets default-page-size rows in a
  # deterministic default sort (unstable paging otherwise duplicates/skips rows).
  # See ARCHITECTURE.md -> "List conventions (pagination / sorting / filtering)".
  pagination:
    max-page-size: ${APP_PAGINATION_MAX_PAGE_SIZE:100}
    default-page-size: ${APP_PAGINATION_DEFAULT_PAGE_SIZE:20}
    default-sort-property: ${APP_PAGINATION_DEFAULT_SORT_PROPERTY:id}
    default-sort-direction: ${APP_PAGINATION_DEFAULT_SORT_DIRECTION:ASC}
  # --- Email verification resend (OSK-77) --------------------------------------
  # POST /api/v1/me/email/resend-verification mints a Firebase verification link and
  # dispatches it (delivery seam is a logging stub until the Workspace SMTP sender
  # lands — OSK-139). resend-cooldown is the minimum interval between two successful
  # resends per user; a rapid repeat gets 429 + Retry-After. Env-overridable so ops
  # can tune it without a rebuild. Bound + validated via EmailVerificationProperties.
  email-verification:
    resend-cooldown: ${APP_EMAIL_VERIFICATION_RESEND_COOLDOWN:60s}

# --- Actuator (ops surface, OSK-50) --------------------------------------------
# Expose only health/info/metrics over HTTP. health is public (liveness/readiness
# probes hit it); info + metrics are meant to require auth — that enforcement is
# added with the security config (OSK-28), which permit-lists health and
# authenticates the rest. show-details=when-authorized hides component health
# detail from anonymous callers (so today, with no auth layer yet, /actuator/health
# returns just {"status":"UP"} and never leaks internals).
management:
  # Metrics export to Google Cloud Monitoring is OFF by default so dev/test are a
  # no-op (having the Stackdriver registry on the classpath would otherwise make
  # every run try to export to GCP and fail). The prod profile turns it on (OSK-55).
  stackdriver:
    metrics:
      export:
        enabled: false
  # Keep the Resilience4j circuit-breaker (OSK-65) out of /actuator/health: the health
  # endpoint is the public liveness probe, and an open breaker (a transient degraded
  # state we already surface as a 503) must not flip it to DOWN and trigger a restart.
  health:
    circuitbreakers:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

# Values surfaced by /actuator/info.
info:
  app:
    name: ${spring.application.name}
    environment: ${app.environment-name}

# --- springdoc / OpenAPI (OSK-57) ----------------------------------------------
# Swagger UI at /swagger-ui, spec JSON at /v3/api-docs. Enabled in non-prod; the
# prod profile disables the UI + spec endpoint so the interactive explorer is not
# on the public surface (application-prod.yml). These paths are permit-listed by
# the security config (OSK-28).
springdoc:
  swagger-ui:
    path: /swagger-ui
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

# --- Build/version stamp (OSK-100) ---------------------------------------------
# Surfaced at GET /version (public, unauthenticated) alongside the web build id.
#   git-sha:  the commit the running image was built from. Injected into the image
#             at BUILD time (Dockerfile `ARG GIT_SHA`, wired from github.sha in
#             image.yml) and exported as the GIT_SHA env var — never hardcoded.
#             Blank locally, where /version falls back to build-info then "unknown".
#   revision: Cloud Run's per-deploy revision, present only at RUNTIME on Cloud Run
#             via the injected K_REVISION env var; blank (→ null) elsewhere.
# The empty ":" defaults mean an unset env var resolves to blank, not a placeholder.
build:
  git-sha: ${GIT_SHA:}
  revision: ${K_REVISION:}

# --- Firebase Auth (OSK-28) ----------------------------------------------------
# The backend verifies each /api/v1/** caller's Firebase ID token against this
# project. Only the project id lives here (not a secret); credentials come from
# Application Default Credentials (ADC) — the Cloud Run runtime SA in prod, or
# `gcloud auth application-default login` locally. NO service-account key is ever
# committed. Override per-environment via FIREBASE_PROJECT_ID if needed.
firebase:
  project-id: ${FIREBASE_PROJECT_ID:openskeleton-one}

# --- Resilience / graceful degradation (OSK-65) --------------------------------
# The backend's ONLY outbound dependency is Firebase Admin SDK token verification
# (behind the TokenVerifier seam). ResilientTokenVerifier wraps that call with a
# TimeLimiter + Retry + CircuitBreaker so a slow or failing Firebase never hangs a
# request or piles up threads: a verify that exceeds the timeout, trips the breaker,
# or exhausts its bounded retries fails fast and the auth filter returns a degraded
# 503 (problem+json). A genuinely INVALID token is still a 401 — only infrastructure
# faults degrade to 503, so AuthFailureWrapper (which carries a real token rejection)
# is listed under ignore-exceptions for both the breaker and the retry.
resilience4j:
  timelimiter:
    instances:
      tokenVerifier:
        # Hard ceiling on a single verify attempt. Firebase verification is normally
        # sub-second (cached signing keys); 2s is generous headroom. On timeout the
        # running future is cancelled/interrupted so the worker thread is freed.
        # Override per-environment via AUTH_VERIFY_TIMEOUT (a Spring duration, e.g. 500ms).
        timeout-duration: ${AUTH_VERIFY_TIMEOUT:2s}
        cancel-running-future: true
  retry:
    instances:
      tokenVerifier:
        # Bounded attempts (1 initial + 2 retries) with exponential backoff, for
        # TRANSIENT faults only. Timeouts, an open breaker (CallNotPermittedException)
        # and real token rejections (AuthFailureWrapper) are NOT retried — retrying a
        # hung/tripped/deterministic call only adds latency — so they are ignored here.
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - io.openskeleton.backend.auth.AuthFailureWrapper
          - java.util.concurrent.TimeoutException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
  circuitbreaker:
    instances:
      tokenVerifier:
        # Count-based window: once >=50% of the last 10 calls (min 5 recorded) fail,
        # the breaker OPENS and every call fast-fails for 10s, then half-opens and
        # probes with 3 calls. Timeouts and transient faults count as failures; a real
        # token rejection (AuthFailureWrapper) must never open the breaker (an attacker
        # spamming bad tokens could otherwise deny service), so it is ignored.
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        # Breaker state is intentionally kept OUT of /actuator/health so an open
        # breaker does not flip the public liveness probe to DOWN and cause a restart.
        register-health-indicator: false
        ignore-exceptions:
          - io.openskeleton.backend.auth.AuthFailureWrapper
