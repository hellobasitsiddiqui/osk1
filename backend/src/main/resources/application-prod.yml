# prod profile — Cloud Run + Cloud SQL. NO usable defaults: every value MUST come
# from the environment (secrets via Secret Manager, OSK-15/OSK-25).
#
# Note the ":" empty-default syntax (${VAR:}): if the env var is unset this
# resolves to an EMPTY string (not the literal "${VAR}"), so @NotBlank on
# AppProperties rejects it and startup fails fast — the intended "prod never boots
# on silent defaults" guarantee. A real env var overrides this (env has higher
# precedence than profile YAML), so prod boots only when explicitly configured.
app:
  environment-name: ${APP_ENVIRONMENT_NAME:}
  public-base-url: ${APP_PUBLIC_BASE_URL:}
spring:
  datasource:
    # Cloud SQL via the socket factory / connector (OSK-20) — no public IP. Cloud Run
    # mounts the instance socket (`--add-cloudsql-instances`) and injects DB_PASSWORD
    # from Secret Manager at deploy (OSK-47). INSTANCE_CONNECTION_NAME + DB_NAME come
    # from the runtime env; there is no committed default password.
    url: jdbc:postgresql:///${DB_NAME:osk}?cloudSqlInstance=${INSTANCE_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD}
  # Allow out-of-order migrations in prod (see LESSONS L11/L12). PR preview backends
  # (OSK-30) historically applied migrations to the shared prod DB in merge-independent
  # order — e.g. V4 (audit_events) landed before V3 (users soft-delete columns), leaving
  # a gap that Flyway's default validation rejects at boot ("resolved migration not
  # applied to database: 3"), which stalled every deploy on `main`. Our migrations are
  # mutually independent (distinct tables/columns), so applying a lower missing version
  # after a higher one yields an identical schema — safe to allow. The ROOT fix is
  # isolating the preview DB so it can never touch prod again (L12 follow-up); this keeps
  # prod deployable in the meantime and self-heals the existing gap on the next boot.
  flyway:
    out-of-order: true

# API docs are NOT exposed in prod — keep the interactive explorer off the public
# surface. The spec can still be generated at build time for the drift check (OSK-88).
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

# Structured JSON logging on prod (OSK-45): Cloud Run ships stdout to Cloud
# Logging, and ECS-format JSON makes every line queryable. Micrometer Tracing
# (see pom) puts trace.id/span.id in the MDC, which the ECS encoder emits per
# line, so a request is traceable end-to-end. dev keeps the default
# human-readable console (no structured format set there).
logging:
  structured:
    format:
      console: ecs

# Export metrics to Google Cloud Monitoring under prod (OSK-55), using the runtime
# service account (Application Default Credentials) — no key file. The GCP project
# comes from the environment; actual visibility requires a GCP project (OSK-36).
management:
  stackdriver:
    metrics:
      export:
        enabled: true
        project-id: ${GOOGLE_CLOUD_PROJECT:}
