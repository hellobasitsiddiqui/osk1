# ---------------------------------------------------------------------------
# Backend application configuration.
#
# 12-factor: every value here must be overridable from the environment and no
# secret is ever committed. Keep this file to safe, non-secret defaults only.
# ---------------------------------------------------------------------------
spring.application.name=backend

# Bind to the port the platform hands us. Cloud Run (and most PaaS) inject $PORT;
# fall back to 8080 for local dev. Never hardcode a port — that's what broke
# portability in the past and violates 12-factor config.
server.port=${PORT:8080}
