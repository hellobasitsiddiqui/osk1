# Test-wide datasource (OSK-29). Applies to EVERY @SpringBootTest with no
# per-test wiring: the special jdbc:tc URL makes Testcontainers spin up a real,
# throwaway PostgreSQL 16 container on demand and point the datasource at it. This
# means the whole suite runs Flyway migrations + Hibernate validation against a
# genuine Postgres (not H2), so anything Postgres-specific is exercised in CI.
#
# ContainerDatabaseDriver is Testcontainers' JDBC proxy driver that recognises the
# jdbc:tc:... scheme, starts/stops the container, and delegates to the real pg
# driver. No host/port/credentials are needed — the container manages them.
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///osktest
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
